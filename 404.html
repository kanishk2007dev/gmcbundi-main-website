<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - BMSA GMC Bundi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Merriweather', 'serif'] },
                    colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#003366', gold: '#FFC107' } }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-brand-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://raw.githubusercontent.com/kanishk2007dev/GMC-n-hssj/main/file_000000003f1c720792a6d2acb3624341%20(1).png" class="h-10 w-10 rounded-full border-2 border-white bg-white p-0.5" alt="Logo">
                <div>
                    <h1 class="font-bold text-lg leading-tight tracking-wide">BMSA</h1>
                    <p class="text-xs text-brand-100">GMC Bundi</p>
                </div>
            </div>
            <a href="https://gmcbundi.dpdns.org/" class="px-4 py-2 bg-brand-700 hover:bg-brand-600 rounded text-sm font-medium transition flex items-center shadow-sm">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Home
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center py-20 px-4 w-full relative overflow-hidden">
        <!-- Background decorative elements -->
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-brand-100 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-pulse"></div>
        <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-pulse" style="animation-delay: 2s;"></div>

        <div class="max-w-lg w-full text-center bg-white p-10 md:p-14 rounded-3xl shadow-xl border border-slate-100 relative z-10">
            <!-- Icon -->
            <div class="mb-6 flex justify-center">
                <div class="w-24 h-24 bg-brand-50 rounded-full flex items-center justify-center shadow-inner">
                    <svg class="w-12 h-12 text-brand-600 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
            </div>
            
            <!-- Error Text -->
            <h1 class="text-7xl md:text-8xl font-black font-serif text-brand-900 mb-2 drop-shadow-sm">404</h1>
            <div class="h-1 w-16 bg-brand-gold mx-auto mb-6 rounded-full"></div>
            
            <h2 class="text-2xl md:text-3xl font-bold text-slate-800 mb-4">Oops! Page Not Found</h2>
            <p class="text-slate-500 mb-8 leading-relaxed">
                The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
            </p>
            
            <!-- CTA Button -->
            <a href="https://gmcbundi.dpdns.org/" class="inline-flex items-center justify-center px-8 py-3.5 bg-brand-900 text-white font-bold rounded-full shadow-lg hover:bg-brand-800 hover:-translate-y-1 hover:shadow-xl transition-all duration-300 w-full sm:w-auto">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Return to Homepage
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-brand-900 text-white py-6 text-center text-sm border-t-4 border-brand-gold mt-auto">
        <p>&copy; 2026 Bundi Medical Student Association. All Rights Reserved.</p>
    </footer>

</body>
</html>
